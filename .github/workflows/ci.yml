name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install SDK dependencies
      run: cd sdk && npm ci

    - name: Install CLI dependencies
      run: cd ai-runtime-cli && npm ci

    - name: TypeScript typecheck
      run: npm run typecheck

    - name: Build SDK (required for tests)
      run: npm run build:sdk

    - name: Run tests
      run: npm test

    - name: Lint check
      run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install SDK dependencies
      run: cd sdk && npm ci

    - name: Install CLI dependencies
      run: cd ai-runtime-cli && npm ci

    - name: Build project
      run: npm run build

